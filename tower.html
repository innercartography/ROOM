<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOM — Frontier Tower</title>
    <meta name="description"
        content="Navigate Frontier Tower through spatial memory. Click a floor to explore its knowledge graph.">
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>
    <style>
        body {
            overflow: hidden;
            margin: 0;
            background: #06060f;
            font-family: var(--font-body, 'Inter', system-ui, sans-serif);
        }

        #canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* Nav */
        .tower-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .tower-nav a {
            color: #e8e0f0;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .tower-nav .brand {
            font-size: 1.1rem;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .tower-nav .links {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .tower-nav .links a {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .tower-nav .links a:hover {
            background: rgba(74, 158, 255, 0.15);
            border-color: rgba(74, 158, 255, 0.3);
        }

        /* Floor labels */
        .floor-label {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(10, 10, 20, 0.88);
            border: 1px solid rgba(74, 158, 255, 0.25);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            backdrop-filter: blur(12px);
            font-family: inherit;
        }

        .floor-label:hover {
            background: rgba(74, 158, 255, 0.18);
            border-color: rgba(74, 158, 255, 0.5);
            transform: translateX(6px);
            box-shadow: 0 0 25px rgba(74, 158, 255, 0.25);
        }

        .floor-icon {
            font-size: 1.3rem;
        }

        .floor-name {
            font-weight: 600;
            font-size: 0.9rem;
            color: #e8e0f0;
        }

        .floor-number {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-left: auto;
            padding: 2px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .tower-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            color: #e8e0f0;
            text-shadow: 0 0 30px rgba(74, 158, 255, 0.4);
            line-height: 1.4;
        }

        .tower-subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }

        /* Hero text */
        .hero-text {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .hero-text strong {
            color: rgba(74, 158, 255, 0.8);
        }

        /* Loading */
        .loading {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #06060f;
            transition: opacity 0.6s;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading h1 {
            font-size: 2rem;
            color: #e8e0f0;
            font-weight: 700;
        }

        .loading p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(74, 158, 255, 0.2);
            border-top-color: #4a9eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <h1>ROOM</h1>
        <p>Loading Frontier Tower…</p>
    </div>

    <nav class="tower-nav">
        <a href="index.html" class="brand">🌐 <span>ROOM</span></a>
        <div class="links">
            <a href="https://enter.rp1.com/?start_cid=553&lat=-18.162044841382034&lon=-168.73454053422424&rad=6371000"
                target="_blank">🌐 Enter RP1</a>
            <a href="viewer.html">🗺️ Full Graph</a>
            <a href="editor.html">✏️ Editor</a>
        </div>
    </nav>

    <div id="canvas"></div>

    <div class="hero-text">
        <strong>Click a floor</strong> to explore its knowledge graph · Drag to orbit · Scroll to zoom
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const FLOORS = [
            { id: 'place-lobby', label: 'Lobby & Entrance', icon: '🚪', y: 0, floor: 'Ground', color: 0x4a9eff },
            { id: 'place-alien-lounge', label: 'The Alien Lounge', icon: '🛸', y: 3, floor: '2nd Floor', color: 0xffc44a },
            { id: 'place-16th-floor', label: 'Hackathon Space', icon: '⚡', y: 20, floor: '16th Floor', color: 0x7c6aff }
        ];

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x06060f);
        scene.fog = new THREE.FogExp2(0x06060f, 0.006);

        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(22, 14, 28);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.getElementById('canvas').appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0';
        labelRenderer.domElement.style.left = '0';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.getElementById('canvas').appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 10;
        controls.maxDistance = 80;
        controls.target.set(0, 10, 0);
        controls.maxPolarAngle = Math.PI * 0.85;
        controls.update();

        // Lighting
        scene.add(new THREE.AmbientLight(0x667788, 0.6));
        const dir = new THREE.DirectionalLight(0xffffff, 0.9);
        dir.position.set(20, 40, 20);
        scene.add(dir);
        const back = new THREE.DirectionalLight(0x4a9eff, 0.3);
        back.position.set(-15, 10, -15);
        scene.add(back);
        const rim = new THREE.PointLight(0x7c6aff, 0.4, 50);
        rim.position.set(-10, 25, 0);
        scene.add(rim);

        // Load tower texture and build
        const textureLoader = new THREE.TextureLoader();
        textureLoader.load('frontier-tower.jpg', (tex) => {
            buildTower(tex);
            document.getElementById('loading').classList.add('hidden');
        }, undefined, () => {
            buildTower(null);
            document.getElementById('loading').classList.add('hidden');
        });

        function buildTower(texture) {
            const W = 8, D = 6, H = 25;

            // Tower box
            const geo = new THREE.BoxGeometry(W, H, D);
            const mats = [
                new THREE.MeshStandardMaterial({ color: 0x2a2a3a, metalness: 0.4, roughness: 0.6 }),
                new THREE.MeshStandardMaterial({ color: 0x2a2a3a, metalness: 0.4, roughness: 0.6 }),
                new THREE.MeshStandardMaterial({ color: 0x3a3a4a, metalness: 0.5, roughness: 0.4 }),
                new THREE.MeshStandardMaterial({ color: 0x1a1a2a }),
                texture
                    ? new THREE.MeshStandardMaterial({ map: texture, metalness: 0.05, roughness: 0.85 })
                    : new THREE.MeshStandardMaterial({ color: 0x4a4a5a }),
                new THREE.MeshStandardMaterial({ color: 0x2a2a3a, metalness: 0.4, roughness: 0.6 }),
            ];
            const tower = new THREE.Mesh(geo, mats);
            tower.position.y = H / 2;
            scene.add(tower);

            // Ground
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(80, 80),
                new THREE.MeshStandardMaterial({ color: 0x080810, transparent: true, opacity: 0.7 })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            scene.add(ground);

            // Grid
            const grid = new THREE.GridHelper(80, 40, 0x151520, 0x0f0f18);
            scene.add(grid);

            // Base glow
            const glow = new THREE.Mesh(
                new THREE.CircleGeometry(7, 32),
                new THREE.MeshBasicMaterial({ color: 0x4a9eff, transparent: true, opacity: 0.06 })
            );
            glow.rotation.x = -Math.PI / 2;
            glow.position.y = 0.05;
            scene.add(glow);

            // Floor markers
            FLOORS.forEach((fl) => {
                // Glowing stripe
                const stripe = new THREE.Mesh(
                    new THREE.PlaneGeometry(W + 4, 0.15),
                    new THREE.MeshBasicMaterial({ color: fl.color, transparent: true, opacity: 0.6, side: THREE.DoubleSide })
                );
                stripe.position.set(0, fl.y, D / 2 + 0.15);
                scene.add(stripe);

                // Glow plane behind stripe
                const glowPlane = new THREE.Mesh(
                    new THREE.PlaneGeometry(W + 6, 2),
                    new THREE.MeshBasicMaterial({ color: fl.color, transparent: true, opacity: 0.06, side: THREE.DoubleSide })
                );
                glowPlane.position.set(0, fl.y, D / 2 + 0.1);
                scene.add(glowPlane);

                // CSS2D label
                const div = document.createElement('div');
                div.className = 'floor-label';
                div.innerHTML = `<span class="floor-icon">${fl.icon}</span> <span class="floor-name">${fl.label}</span><span class="floor-number">${fl.floor}</span>`;
                div.style.pointerEvents = 'auto';
                div.addEventListener('click', () => {
                    window.location.href = `viewer.html?place=${fl.id}`;
                });
                const label = new CSS2DObject(div);
                label.position.set(W / 2 + 6, fl.y + 0.5, D / 2);
                scene.add(label);
            });

            // Tower title
            const titleDiv = document.createElement('div');
            titleDiv.className = 'tower-title';
            titleDiv.innerHTML = `🏛️ Frontier Tower<br><span class="tower-subtitle">995 Market St · San Francisco</span>`;
            const titleLabel = new CSS2DObject(titleDiv);
            titleLabel.position.set(0, H + 2.5, 0);
            scene.add(titleLabel);

            // Elevator line connecting floors
            for (let i = 0; i < FLOORS.length - 1; i++) {
                const from = FLOORS[i], to = FLOORS[i + 1];
                const pts = [];
                for (let s = 0; s <= 30; s++) {
                    const t = s / 30;
                    const y = from.y + (to.y - from.y) * t;
                    const x = W / 2 + 2.5 + Math.sin(t * Math.PI) * 1.2;
                    pts.push(new THREE.Vector3(x, y, D / 2));
                }
                const line = new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints(pts),
                    new THREE.LineBasicMaterial({ color: 0x4a9eff, transparent: true, opacity: 0.2 })
                );
                scene.add(line);
            }
        }

        // Particles
        const pCount = 1500;
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(pCount * 3);
        const pCol = new Float32Array(pCount * 3);
        for (let i = 0; i < pCount; i++) {
            pPos[i * 3] = (Math.random() - 0.5) * 100;
            pPos[i * 3 + 1] = Math.random() * 35;
            pPos[i * 3 + 2] = (Math.random() - 0.5) * 100;
            const c = new THREE.Color().setHSL(0.65 + Math.random() * 0.2, 0.4, 0.25 + Math.random() * 0.15);
            pCol[i * 3] = c.r; pCol[i * 3 + 1] = c.g; pCol[i * 3 + 2] = c.b;
        }
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
        scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
            size: 0.1, vertexColors: true, transparent: true, opacity: 0.45, sizeAttenuation: true
        })));

        // Animate
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
