<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOM — Frontier Tower</title>
    <meta name="description"
        content="Navigate Frontier Tower through spatial memory. Click a floor to explore its knowledge graph.">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #04040c;
            font-family: 'Inter', system-ui, sans-serif;
            color: #e0ddf0;
        }

        #canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        /* ── Nav ── */
        .tower-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 28px;
            background: linear-gradient(180deg, rgba(6, 6, 18, 0.92) 0%, rgba(6, 6, 18, 0.7) 100%);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(124, 106, 255, 0.08);
        }

        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.15rem;
            font-weight: 700;
            color: #e0ddf0;
            text-decoration: none;
            display: flex;
            gap: 8px;
            align-items: center;
            letter-spacing: -0.02em;
        }

        .brand span {
            background: linear-gradient(135deg, #7c6aff, #4a9eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-links a {
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 0.78rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.65);
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.07);
            transition: all 0.25s;
            letter-spacing: 0.01em;
        }

        .nav-links a:hover {
            background: rgba(124, 106, 255, 0.12);
            border-color: rgba(124, 106, 255, 0.25);
            color: #e0ddf0;
        }

        /* ── Floor labels ── */
        .floor-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 22px;
            background: rgba(8, 8, 20, 0.82);
            border: 1px solid rgba(124, 106, 255, 0.18);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            backdrop-filter: blur(16px);
            font-family: 'Inter', sans-serif;
            min-width: 240px;
        }

        .floor-label:hover {
            background: rgba(124, 106, 255, 0.12);
            border-color: rgba(124, 106, 255, 0.4);
            transform: translateX(8px) scale(1.02);
            box-shadow: 0 0 30px rgba(124, 106, 255, 0.15), inset 0 0 20px rgba(124, 106, 255, 0.05);
        }

        .floor-icon {
            font-size: 1.4rem;
            filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.3));
        }

        .floor-name {
            font-weight: 600;
            font-size: 0.88rem;
            color: #e0ddf0;
            letter-spacing: -0.01em;
        }

        .floor-number {
            font-size: 0.68rem;
            color: rgba(255, 255, 255, 0.3);
            margin-left: auto;
            padding: 3px 10px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 6px;
            font-weight: 500;
            letter-spacing: 0.03em;
        }

        /* ── Tower title ── */
        .tower-title {
            text-align: center;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: #e0ddf0;
            text-shadow: 0 0 40px rgba(124, 106, 255, 0.3);
            letter-spacing: -0.02em;
        }

        .tower-subtitle {
            display: block;
            font-size: 0.72rem;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
            margin-top: 4px;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* ── Hero CTA ── */
        .hero-cta {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.02em;
        }

        .hero-cta strong {
            color: rgba(124, 106, 255, 0.7);
            font-weight: 600;
        }

        /* ── Loading ── */
        .loading {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: #04040c;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            color: #e0ddf0;
            font-weight: 700;
            background: linear-gradient(135deg, #7c6aff, #4a9eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loading p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.85rem;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid rgba(124, 106, 255, 0.15);
            border-top-color: #7c6aff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <h1>ROOM</h1>
        <p>Constructing spatial memory…</p>
    </div>

    <nav class="tower-nav">
        <a href="index.html" class="brand">🌐 <span>ROOM</span></a>
        <div class="nav-links">
            <a href="https://enter.rp1.com/?start_cid=553&lat=-18.162044841382034&lon=-168.73454053422424&rad=6371000"
                target="_blank">🌐 Enter RP1</a>
            <a href="viewer.html">🗺️ Full Graph</a>
            <a href="editor.html">✏️ Editor</a>
        </div>
    </nav>

    <div id="canvas"></div>

    <div class="hero-cta">
        <strong>Select a floor</strong> to explore its knowledge graph
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        const FLOORS = [
            { id: 'place-lobby', label: 'Lobby & Entrance', icon: '🚪', y: 0, floor: 'Ground', color: new THREE.Color(0x4a9eff) },
            { id: 'place-alien-lounge', label: 'The Alien Lounge', icon: '🛸', y: 3.5, floor: '2nd Floor', color: new THREE.Color(0xffc44a) },
            { id: 'place-16th-floor', label: 'Hackathon Space', icon: '⚡', y: 24.5, floor: '16th Floor', color: new THREE.Color(0x7c6aff) }
        ];

        const clock = new THREE.Clock();
        let glowPanels = [];
        let floorGlows = [];

        // ── Scene ──
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x04040c);
        scene.fog = new THREE.FogExp2(0x04040c, 0.005);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(24, 16, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.4;
        document.getElementById('canvas').appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0';
        labelRenderer.domElement.style.left = '0';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.getElementById('canvas').appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.04;
        controls.minDistance = 12;
        controls.maxDistance = 70;
        controls.target.set(0, 11, 0);
        controls.maxPolarAngle = Math.PI * 0.82;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        controls.update();

        // ── Lighting ──
        scene.add(new THREE.AmbientLight(0x334466, 0.4));

        const key = new THREE.DirectionalLight(0xeeeeff, 1.0);
        key.position.set(15, 35, 20);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0x4a9eff, 0.25);
        fill.position.set(-20, 15, -10);
        scene.add(fill);

        const accent = new THREE.PointLight(0x7c6aff, 0.6, 60);
        accent.position.set(-8, 28, 5);
        scene.add(accent);

        const warmAccent = new THREE.PointLight(0xffc44a, 0.3, 40);
        warmAccent.position.set(10, 4, 8);
        scene.add(warmAccent);

        // ── Tower Construction ──
        buildTower();
        document.getElementById('loading').classList.add('hidden');

        function buildTower() {
            const W = 7, D = 5.5, H = 26;
            const floors = 18;
            const floorH = H / floors;

            // ── Base structure: dark metallic frame ──
            const frameMat = new THREE.MeshStandardMaterial({
                color: 0x2d2d45,
                metalness: 0.8,
                roughness: 0.2,
                emissive: 0x0a0a18,
                emissiveIntensity: 0.3,
            });
            // Vertical edge pillars
            const pillarGeo = new THREE.BoxGeometry(0.3, H, 0.3);
            const pillarPositions = [
                [-W / 2, H / 2, D / 2], [W / 2, H / 2, D / 2],
                [-W / 2, H / 2, -D / 2], [W / 2, H / 2, -D / 2]
            ];
            pillarPositions.forEach(p => {
                const pillar = new THREE.Mesh(pillarGeo, frameMat);
                pillar.position.set(...p);
                scene.add(pillar);
            });

            // Horizontal floor slabs
            const slabGeo = new THREE.BoxGeometry(W + 0.1, 0.12, D + 0.1);
            for (let i = 0; i <= floors; i++) {
                const slab = new THREE.Mesh(slabGeo, frameMat);
                slab.position.y = i * floorH;
                scene.add(slab);
            }

            // ── Glass panels ──
            const glassMat = new THREE.MeshPhysicalMaterial({
                color: 0x2a4a7a,
                metalness: 0.15,
                roughness: 0.05,
                transmission: 0.5,
                thickness: 0.3,
                transparent: true,
                opacity: 0.5,
                side: THREE.DoubleSide,
                envMapIntensity: 2.0,
                emissive: 0x0a1530,
                emissiveIntensity: 0.4,
            });

            // Front and back glass
            for (let i = 0; i < floors; i++) {
                const panelGeo = new THREE.PlaneGeometry(W - 0.4, floorH - 0.18);

                // Front
                const front = new THREE.Mesh(panelGeo, glassMat.clone());
                front.position.set(0, i * floorH + floorH / 2, D / 2 + 0.01);
                scene.add(front);
                glowPanels.push(front);

                // Back
                const back = new THREE.Mesh(panelGeo, glassMat.clone());
                back.position.set(0, i * floorH + floorH / 2, -D / 2 - 0.01);
                back.rotation.y = Math.PI;
                scene.add(back);
            }

            // Side glass
            for (let i = 0; i < floors; i++) {
                const sideGeo = new THREE.PlaneGeometry(D - 0.4, floorH - 0.18);

                const left = new THREE.Mesh(sideGeo, glassMat.clone());
                left.position.set(-W / 2 - 0.01, i * floorH + floorH / 2, 0);
                left.rotation.y = -Math.PI / 2;
                scene.add(left);

                const right = new THREE.Mesh(sideGeo, glassMat.clone());
                right.position.set(W / 2 + 0.01, i * floorH + floorH / 2, 0);
                right.rotation.y = Math.PI / 2;
                scene.add(right);
            }

            // ── Interior glow (simulated lit floors) ──
            for (let i = 0; i < floors; i++) {
                const intensity = Math.random() * 0.6 + 0.3;
                const hue = 0.58 + Math.random() * 0.15;
                const lightGeo = new THREE.PlaneGeometry(W - 0.8, D - 0.8);
                const lightMat = new THREE.MeshBasicMaterial({
                    color: new THREE.Color().setHSL(hue, 0.7, 0.45),
                    transparent: true,
                    opacity: intensity * 0.5,
                    side: THREE.DoubleSide
                });
                const light = new THREE.Mesh(lightGeo, lightMat);
                light.rotation.x = -Math.PI / 2;
                light.position.y = i * floorH + 0.15;
                scene.add(light);
            }

            // ── Roof structures ──
            // Edge glow outlines on building corners
            const edgeMat = new THREE.LineBasicMaterial({ color: 0x4a6aaa, transparent: true, opacity: 0.25 });
            const edges = [
                [[-W / 2, 0, D / 2], [-W / 2, H, D / 2]], [[W / 2, 0, D / 2], [W / 2, H, D / 2]],
                [[-W / 2, 0, -D / 2], [-W / 2, H, -D / 2]], [[W / 2, 0, -D / 2], [W / 2, H, -D / 2]]
            ];
            edges.forEach(([a, b]) => {
                const g = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...a), new THREE.Vector3(...b)]);
                scene.add(new THREE.Line(g, edgeMat));
            });

            const roofBase = new THREE.Mesh(
                new THREE.BoxGeometry(W + 0.4, 0.4, D + 0.4),
                new THREE.MeshStandardMaterial({ color: 0x2a2a40, metalness: 0.7, roughness: 0.3, emissive: 0x0a0a15, emissiveIntensity: 0.2 })
            );
            roofBase.position.y = H + 0.2;
            scene.add(roofBase);

            // Antenna
            const antenna = new THREE.Mesh(
                new THREE.CylinderGeometry(0.06, 0.08, 3, 8),
                new THREE.MeshStandardMaterial({ color: 0x444466, metalness: 0.8, roughness: 0.2 })
            );
            antenna.position.set(0, H + 1.7, 0);
            scene.add(antenna);

            // Antenna glow
            const antennaGlow = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 16, 16),
                new THREE.MeshBasicMaterial({ color: 0xff4444, transparent: true, opacity: 0.8 })
            );
            antennaGlow.position.set(0, H + 3.2, 0);
            scene.add(antennaGlow);
            floorGlows.push({ mesh: antennaGlow, baseOpacity: 0.8, speed: 2.5 });

            // ── Floor markers ──
            FLOORS.forEach((fl) => {
                // Glow stripe on building face
                const stripe = new THREE.Mesh(
                    new THREE.PlaneGeometry(W + 1, 0.08),
                    new THREE.MeshBasicMaterial({ color: fl.color, transparent: true, opacity: 0.9, side: THREE.DoubleSide })
                );
                stripe.position.set(0, fl.y, D / 2 + 0.2);
                scene.add(stripe);

                // Halo glow behind stripe
                const halo = new THREE.Mesh(
                    new THREE.PlaneGeometry(W + 3, 2.5),
                    new THREE.MeshBasicMaterial({ color: fl.color, transparent: true, opacity: 0.04, side: THREE.DoubleSide })
                );
                halo.position.set(0, fl.y, D / 2 + 0.15);
                scene.add(halo);
                floorGlows.push({ mesh: halo, baseOpacity: 0.04, speed: 1 + Math.random() });

                // Point light at floor level
                const pt = new THREE.PointLight(fl.color, 0.4, 15);
                pt.position.set(0, fl.y, D / 2 + 2);
                scene.add(pt);

                // CSS2D label
                const div = document.createElement('div');
                div.className = 'floor-label';
                div.innerHTML = `<span class="floor-icon">${fl.icon}</span> <span class="floor-name">${fl.label}</span><span class="floor-number">${fl.floor}</span>`;
                div.style.pointerEvents = 'auto';
                div.addEventListener('click', () => {
                    window.location.href = `viewer.html?place=${fl.id}`;
                });
                const label = new CSS2DObject(div);
                label.position.set(W / 2 + 6, fl.y + 0.5, D / 2);
                scene.add(label);
            });

            // ── Tower title ──
            const titleDiv = document.createElement('div');
            titleDiv.className = 'tower-title';
            titleDiv.innerHTML = `🏛️ Frontier Tower<br><span class="tower-subtitle">995 Market St · San Francisco</span>`;
            const titleLabel = new CSS2DObject(titleDiv);
            titleLabel.position.set(0, H + 4.5, 0);
            scene.add(titleLabel);

            // ── Elevator connector curves ──
            for (let i = 0; i < FLOORS.length - 1; i++) {
                const from = FLOORS[i], to = FLOORS[i + 1];
                const pts = [];
                for (let s = 0; s <= 40; s++) {
                    const t = s / 40;
                    const y = from.y + (to.y - from.y) * t;
                    const x = W / 2 + 2.5 + Math.sin(t * Math.PI) * 1.5;
                    pts.push(new THREE.Vector3(x, y, D / 2));
                }
                const line = new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints(pts),
                    new THREE.LineBasicMaterial({ color: 0x4a9eff, transparent: true, opacity: 0.15 })
                );
                scene.add(line);

                // Dotted version for depth
                const dotPts = [];
                for (let s = 0; s <= 20; s++) {
                    const t = s / 20;
                    dotPts.push(new THREE.Vector3(
                        W / 2 + 2.5 + Math.sin(t * Math.PI) * 1.5,
                        from.y + (to.y - from.y) * t,
                        D / 2
                    ));
                }
                const dotGeo = new THREE.BufferGeometry().setFromPoints(dotPts);
                const dots = new THREE.Points(dotGeo, new THREE.PointsMaterial({
                    color: 0x7c6aff, size: 0.08, transparent: true, opacity: 0.4, sizeAttenuation: true
                }));
                scene.add(dots);
            }

            // ── Ground plane ──
            const ground = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({
                    color: 0x060610,
                    transparent: true,
                    opacity: 0.85,
                    roughness: 0.95
                })
            );
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.1;
            scene.add(ground);

            // Subtle grid
            const grid = new THREE.GridHelper(100, 50, 0x12121f, 0x0a0a15);
            scene.add(grid);

            // Ground reflection glow
            const reflGlow = new THREE.Mesh(
                new THREE.CircleGeometry(6, 32),
                new THREE.MeshBasicMaterial({ color: 0x7c6aff, transparent: true, opacity: 0.04 })
            );
            reflGlow.rotation.x = -Math.PI / 2;
            reflGlow.position.y = 0.02;
            scene.add(reflGlow);
        }

        // ── Particles ──
        const pCount = 2000;
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(pCount * 3);
        const pCol = new Float32Array(pCount * 3);
        for (let i = 0; i < pCount; i++) {
            pPos[i * 3] = (Math.random() - 0.5) * 120;
            pPos[i * 3 + 1] = Math.random() * 40;
            pPos[i * 3 + 2] = (Math.random() - 0.5) * 120;
            const c = new THREE.Color().setHSL(0.62 + Math.random() * 0.18, 0.35, 0.2 + Math.random() * 0.15);
            pCol[i * 3] = c.r; pCol[i * 3 + 1] = c.g; pCol[i * 3 + 2] = c.b;
        }
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        pGeo.setAttribute('color', new THREE.BufferAttribute(pCol, 3));
        scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
            size: 0.08, vertexColors: true, transparent: true, opacity: 0.4, sizeAttenuation: true
        })));

        // ── Animate ──
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            controls.update();

            // Animate glass panels — subtle color shift
            glowPanels.forEach((panel, i) => {
                if (panel.material) {
                    const phase = t * 0.3 + i * 0.2;
                    panel.material.opacity = 0.3 + Math.sin(phase) * 0.08;
                    const hue = 0.58 + Math.sin(t * 0.1 + i * 0.1) * 0.05;
                    panel.material.color.setHSL(hue, 0.5, 0.2);
                }
            });

            // Animate floor glows — breathing effect
            floorGlows.forEach(fg => {
                fg.mesh.material.opacity = fg.baseOpacity + Math.sin(t * fg.speed) * fg.baseOpacity * 0.5;
            });

            // Subtle accent light movement
            accent.position.x = -8 + Math.sin(t * 0.5) * 3;
            accent.position.z = 5 + Math.cos(t * 0.7) * 3;
            accent.intensity = 0.5 + Math.sin(t * 0.8) * 0.15;

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        // ── Resize ──
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
