<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROOM — Editor</title>
    <meta name="description" content="Edit spatial memory. Create, annotate, and visualize ROOM knowledge graphs.">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .editor-layout {
            display: flex;
            flex: 1;
            margin-top: 50px;
            overflow: hidden;
        }

        /* ── Graph Canvas ── */
        .graph-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #graphCanvas {
            width: 100%;
            height: 100%;
        }

        #graphCanvas svg {
            width: 100%;
            height: 100%;
        }

        .graph-node {
            cursor: pointer;
            transition: filter 0.15s;
        }

        .graph-node:hover {
            filter: brightness(1.3);
        }

        .graph-node.selected circle,
        .graph-node.selected rect {
            stroke-width: 3;
            filter: drop-shadow(0 0 8px currentColor);
        }

        .graph-link {
            stroke: rgba(120, 120, 255, 0.15);
            stroke-width: 1.5;
            fill: none;
        }

        .graph-link-label {
            fill: rgba(120, 120, 255, 0.4);
            font-size: 9px;
            font-family: 'JetBrains Mono', monospace;
        }

        .node-label {
            fill: var(--room-text);
            font-size: 11px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            pointer-events: none;
            text-anchor: middle;
        }

        .node-icon {
            font-size: 14px;
            text-anchor: middle;
            pointer-events: none;
        }

        .graph-toolbar {
            position: absolute;
            top: var(--space-md);
            left: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
            z-index: 5;
        }

        .graph-stats {
            position: absolute;
            bottom: var(--space-md);
            left: var(--space-md);
            font-size: var(--text-xs);
            color: var(--room-text-muted);
            font-family: var(--font-mono);
        }

        /* ── Side Panel ── */
        .side-panel {
            width: 380px;
            height: 100%;
            background: var(--room-bg-raised);
            border-left: 1px solid var(--room-border);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--room-border);
            flex-shrink: 0;
        }

        .panel-tab {
            flex: 1;
            padding: var(--space-sm) var(--space-md);
            background: transparent;
            border: none;
            color: var(--room-text-dim);
            font-family: var(--font-sans);
            font-size: var(--text-sm);
            font-weight: 500;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all var(--duration-fast);
        }

        .panel-tab:hover {
            color: var(--room-text);
            background: var(--room-bg-surface);
        }

        .panel-tab.active {
            color: var(--room-accent-bright);
            border-bottom-color: var(--room-accent);
        }

        .panel-content {
            flex: 1;
            padding: var(--space-md);
            overflow-y: auto;
            display: none;
        }

        .panel-content.active {
            display: block;
        }

        /* ── Add Node Form ── */
        .form-section {
            margin-bottom: var(--space-lg);
        }

        .form-section-title {
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--room-text);
            margin-bottom: var(--space-sm);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .form-row {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-sm);
        }

        .form-row>* {
            flex: 1;
        }

        /* ── Node List ── */
        .node-list-item {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            padding: var(--space-sm);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: background var(--duration-fast);
            margin-bottom: 2px;
        }

        .node-list-item:hover {
            background: var(--room-bg-hover);
        }

        .node-list-item.selected {
            background: var(--room-bg-surface);
            border: 1px solid var(--room-border-bright);
        }

        .node-list-icon {
            font-size: 1rem;
            flex-shrink: 0;
        }

        .node-list-info {
            flex: 1;
            min-width: 0;
        }

        .node-list-name {
            font-size: var(--text-sm);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .node-list-meta {
            font-size: var(--text-xs);
            color: var(--room-text-muted);
        }

        .node-list-delete {
            opacity: 0;
            transition: opacity var(--duration-fast);
            flex-shrink: 0;
        }

        .node-list-item:hover .node-list-delete {
            opacity: 1;
        }

        /* ── Claudesidian Import ── */
        .import-zone {
            border: 2px dashed var(--room-border);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            text-align: center;
            transition: all var(--duration-normal);
            cursor: pointer;
        }

        .import-zone:hover,
        .import-zone.dragover {
            border-color: var(--room-accent);
            background: rgba(124, 106, 255, 0.05);
        }

        .import-zone-icon {
            font-size: 2rem;
            margin-bottom: var(--space-sm);
        }

        .import-zone-text {
            font-size: var(--text-sm);
            color: var(--room-text-dim);
        }

        .import-preview {
            margin-top: var(--space-md);
            padding: var(--space-md);
            background: var(--room-bg-surface);
            border: 1px solid var(--room-border);
            border-radius: var(--radius-md);
            display: none;
        }

        .import-preview.show {
            display: block;
            animation: fadeIn 0.3s var(--ease-out);
        }

        /* ── JSON panel ── */
        .json-editor {
            width: 100%;
            min-height: 300px;
            background: var(--room-bg-surface);
            border: 1px solid var(--room-border);
            border-radius: var(--radius-md);
            padding: var(--space-md);
            color: var(--room-text);
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            line-height: 1.6;
            resize: vertical;
        }

        /* ── Ontology Filter (in toolbar) ── */
        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-xs);
            margin-bottom: var(--space-md);
        }

        .filter-chip {
            padding: 2px 8px;
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid;
            background: transparent;
            font-family: var(--font-sans);
            transition: all var(--duration-fast);
        }

        .filter-chip.off {
            opacity: 0.3;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .editor-layout {
                flex-direction: column;
            }

            .side-panel {
                width: 100%;
                height: 50%;
            }
        }
    </style>
</head>

<body>

    <!-- Top navigation -->
    <nav class="nav">
        <a href="index.html" class="nav-brand">🌐 <span>ROOM</span></a>
        <ul class="nav-links">
            <li><a href="viewer.html" class="nav-link">👁️ Viewer</a></li>
            <li><a href="editor.html" class="nav-link active">✏️ Editor</a></li>
        </ul>
    </nav>

    <div class="editor-layout">
        <!-- Graph visualization -->
        <div class="graph-container">
            <div class="graph-toolbar">
                <button class="btn btn-sm" id="btnZoomFit" title="Fit graph to view">🔍 Fit</button>
                <button class="btn btn-sm" id="btnRestart" title="Restart simulation">🔄 Reset Layout</button>
                <button class="btn btn-sm" id="btnClearStorage" title="Clear saved data and reload defaults"
                    style="margin-left:auto; opacity:0.6">🗑️ Reset Data</button>
            </div>
            <div id="graphCanvas"></div>
            <div class="graph-stats" id="graphStats"></div>
        </div>

        <!-- Side panel -->
        <div class="side-panel">
            <div class="panel-tabs">
                <button class="panel-tab active" data-panel="nodes">Nodes</button>
                <button class="panel-tab" data-panel="add">+ Add</button>
                <button class="panel-tab" data-panel="claudesidian">🧠 PKG</button>
                <button class="panel-tab" data-panel="json">{ } JSON</button>
            </div>

            <!-- Nodes Panel -->
            <div class="panel-content active" id="panel-nodes">
                <div class="filter-chips" id="ontologyChips"></div>
                <div id="nodeList"></div>
            </div>

            <!-- Add Node Panel -->
            <div class="panel-content" id="panel-add">
                <div class="form-section">
                    <div class="form-section-title">🆕 Create Node</div>

                    <div class="form-group" style="margin-bottom:var(--space-sm)">
                        <label class="form-label">Type</label>
                        <select class="form-select" id="addType">
                            <option value="place">📍 Place</option>
                            <option value="event">⚡ Event</option>
                            <option value="perspective">👁️ Perspective</option>
                            <option value="artifact">📄 Artifact</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom:var(--space-sm)">
                        <label class="form-label">Label</label>
                        <input class="form-input" id="addLabel" placeholder="Node label">
                    </div>

                    <div class="form-group" style="margin-bottom:var(--space-sm)">
                        <label class="form-label">Description</label>
                        <textarea class="form-textarea" id="addDescription" placeholder="Description…" rows="3"
                            style="min-height:60px;font-family:var(--font-sans)"></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">X</label>
                            <input class="form-input" id="addPosX" type="number" value="0" step="1">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Y</label>
                            <input class="form-input" id="addPosY" type="number" value="5" step="1">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Z</label>
                            <input class="form-input" id="addPosZ" type="number" value="0" step="1">
                        </div>
                    </div>

                    <!-- Conditional fields -->
                    <div id="addEventFields" style="display:none">
                        <div class="form-group" style="margin-bottom:var(--space-sm)">
                            <label class="form-label">Anchored to Place</label>
                            <select class="form-select" id="addEventPlace"></select>
                        </div>
                        <div class="form-group" style="margin-bottom:var(--space-sm)">
                            <label class="form-label">Time</label>
                            <input class="form-input" id="addEventTime" type="datetime-local">
                        </div>
                    </div>

                    <div id="addPerspectiveFields" style="display:none">
                        <div class="form-group" style="margin-bottom:var(--space-sm)">
                            <label class="form-label">Observes Event</label>
                            <select class="form-select" id="addPerspectiveEvent"></select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Ontology</label>
                                <input class="form-input" id="addOntology" placeholder="e.g. architectural">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Visibility</label>
                                <select class="form-select" id="addVisibility">
                                    <option value="public">🌐 Public</option>
                                    <option value="private">🔒 Private</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom:var(--space-sm)">
                            <label class="form-label">Content</label>
                            <textarea class="form-textarea" id="addContent" placeholder="Perspective content…"
                                rows="5"></textarea>
                        </div>
                    </div>

                    <div id="addArtifactFields" style="display:none">
                        <div class="form-group" style="margin-bottom:var(--space-sm)">
                            <label class="form-label">Produced by Perspective</label>
                            <select class="form-select" id="addArtifactPerspective"></select>
                        </div>
                        <div class="form-group" style="margin-bottom:var(--space-sm)">
                            <label class="form-label">Source (src)</label>
                            <input class="form-input" id="addSrc" placeholder="path/to/file.ext">
                        </div>
                    </div>

                    <button class="btn btn-primary" id="btnAddNode" style="margin-top:var(--space-md);width:100%">Create
                        Node</button>
                </div>
            </div>

            <!-- Claudesidian Panel -->
            <div class="panel-content" id="panel-claudesidian">
                <div class="form-section">
                    <div class="form-section-title">🧠 Claudesidian → ROOM Bridge</div>
                    <p
                        style="font-size:var(--text-sm); color:var(--room-text-dim); margin-bottom:var(--space-md); max-width:100%">
                        Paste Obsidian markdown (with optional YAML frontmatter) to create a Perspective node. Your
                        personal knowledge graph becomes spatial memory.
                    </p>

                    <div class="import-zone" id="importZone">
                        <div class="import-zone-icon">📋</div>
                        <div class="import-zone-text">Paste or drop Obsidian markdown here</div>
                    </div>

                    <textarea class="form-textarea" id="claudesidianInput" placeholder="---
title: My Observation
ontology: personal
visibility: private
---

# My notes about this place

Content goes here…" rows="10" style="margin-top:var(--space-md)"></textarea>

                    <div class="form-row" style="margin-top:var(--space-sm)">
                        <div class="form-group">
                            <label class="form-label">Attach to Event</label>
                            <select class="form-select" id="claudesidianEvent"></select>
                        </div>
                    </div>

                    <div class="import-preview" id="importPreview">
                        <div
                            style="font-size:var(--text-xs); color:var(--room-text-muted); margin-bottom:var(--space-xs)">
                            PREVIEW</div>
                        <div id="importPreviewContent"></div>
                    </div>

                    <div style="display:flex; gap:var(--space-sm); margin-top:var(--space-md)">
                        <button class="btn" id="btnPreview" style="flex:1">👁️ Preview</button>
                        <button class="btn btn-primary" id="btnImport" style="flex:1">⬆️ Import as Perspective</button>
                    </div>
                </div>
            </div>

            <!-- JSON Panel -->
            <div class="panel-content" id="panel-json">
                <div class="form-section">
                    <div class="form-section-title">{ } Raw world.json</div>
                    <textarea class="json-editor" id="jsonEditor"></textarea>
                    <div style="display:flex; gap:var(--space-sm); margin-top:var(--space-sm)">
                        <button class="btn" id="btnJsonLoad" style="flex:1">📥 Apply</button>
                        <button class="btn" id="btnJsonCopy" style="flex:1">📋 Copy</button>
                        <button class="btn" id="btnJsonDownload" style="flex:1">💾 Download</button>
                    </div>
                    <div style="display:flex; gap:var(--space-sm); margin-top:var(--space-sm)">
                        <button class="btn" id="btnJsonImportFile" style="flex:1">📂 Load File</button>
                        <input type="file" id="jsonFileInput" accept=".json" style="display:none">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast toast-success" id="toast"></div>

    <!-- Scripts -->
    <script src="room.js"></script>
    <script>
        /* ═══════════════════════════════════════════
           State
           ═══════════════════════════════════════════ */
        let simulation, svg, g, linkGroup, nodeGroup, labelGroup;
        let selectedNodeId = null;
        let activeOntologies = new Set();
        let graphWidth, graphHeight;

        /* ═══════════════════════════════════════════
           Init
           ═══════════════════════════════════════════ */
        async function init() {
            // Try localStorage first, fall back to sample-world.json
            const saved = ROOM.loadFromStorage();
            if (saved) {
                console.log('ROOM Editor: loaded from localStorage');
            } else {
                await ROOM.loadWorldFromURL('sample-world.json');
                ROOM.saveToStorage(); // seed localStorage on first load
                console.log('ROOM Editor: loaded from sample-world.json (first run)');
            }

            ROOM.getOntologies().forEach(o => activeOntologies.add(o));

            initGraph();
            buildNodeList();
            buildOntologyChips();
            populateDropdowns();
            updateStats();
            syncJSON();
            setupEvents();
        }

        /* ═══════════════════════════════════════════
           D3 Force Graph
           ═══════════════════════════════════════════ */
        function initGraph() {
            const container = document.getElementById('graphCanvas');
            graphWidth = container.clientWidth;
            graphHeight = container.clientHeight;

            svg = d3.select(container)
                .append('svg')
                .attr('width', graphWidth)
                .attr('height', graphHeight);

            // Zoom/pan
            const zoom = d3.zoom()
                .scaleExtent([0.1, 5])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            svg.call(zoom);

            g = svg.append('g');
            linkGroup = g.append('g').attr('class', 'links');
            nodeGroup = g.append('g').attr('class', 'nodes');
            labelGroup = g.append('g').attr('class', 'labels');

            // Arrow marker
            svg.append('defs').append('marker')
                .attr('id', 'arrowhead')
                .attr('viewBox', '0 -5 10 10')
                .attr('refX', 25)
                .attr('refY', 0)
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .attr('orient', 'auto')
                .append('path')
                .attr('d', 'M0,-5L10,0L0,5')
                .attr('fill', 'rgba(120,120,255,0.3)');

            updateGraph();
        }

        function updateGraph() {
            const world = ROOM.getWorld();
            if (!world) return;

            // Prepare data
            const nodes = world.nodes.map(n => ({
                ...n,
                _id: n.id,
                color: ROOM.NODE_COLORS[n.type] || '#888'
            }));

            const nodeIds = new Set(nodes.map(n => n.id));
            const links = world.edges
                .filter(e => nodeIds.has(e.source) || nodeIds.has(e.source?.id || e.source))
                .filter(e => nodeIds.has(e.target) || nodeIds.has(e.target?.id || e.target))
                .map(e => ({
                    source: typeof e.source === 'object' ? e.source.id : e.source,
                    target: typeof e.target === 'object' ? e.target.id : e.target,
                    type: e.type,
                    label: e.label || e.type
                }));

            // Force simulation
            if (simulation) simulation.stop();

            simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(100))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(graphWidth / 2, graphHeight / 2))
                .force('collision', d3.forceCollide().radius(30))
                .on('tick', ticked);

            // Links
            const link = linkGroup.selectAll('line')
                .data(links, d => `${d.source?.id || d.source}-${d.target?.id || d.target}`);

            link.exit().remove();

            const linkEnter = link.enter()
                .append('line')
                .attr('class', 'graph-link')
                .attr('marker-end', 'url(#arrowhead)');

            const allLinks = linkEnter.merge(link);

            // Link labels
            const linkLabel = labelGroup.selectAll('.graph-link-label')
                .data(links, d => `${d.source?.id || d.source}-${d.target?.id || d.target}`);

            linkLabel.exit().remove();

            const linkLabelEnter = linkLabel.enter()
                .append('text')
                .attr('class', 'graph-link-label')
                .attr('text-anchor', 'middle')
                .text(d => d.label);

            const allLinkLabels = linkLabelEnter.merge(linkLabel);

            // Nodes
            const node = nodeGroup.selectAll('.graph-node')
                .data(nodes, d => d.id);

            node.exit().remove();

            const nodeEnter = node.enter()
                .append('g')
                .attr('class', 'graph-node')
                .call(d3.drag()
                    .on('start', dragStart)
                    .on('drag', dragging)
                    .on('end', dragEnd))
                .on('click', (event, d) => {
                    event.stopPropagation();
                    selectGraphNode(d.id);
                });

            nodeEnter.append('circle')
                .attr('r', d => d.type === 'place' ? 18 : d.type === 'event' ? 14 : 12)
                .attr('fill', d => d.color + '22')
                .attr('stroke', d => d.color)
                .attr('stroke-width', 1.5);

            nodeEnter.append('text')
                .attr('class', 'node-icon')
                .attr('dy', '0.35em')
                .text(d => d.icon || ROOM.NODE_ICONS[d.type]);

            nodeEnter.append('text')
                .attr('class', 'node-label')
                .attr('dy', d => (d.type === 'place' ? 18 : d.type === 'event' ? 14 : 12) + 14)
                .text(d => truncate(d.label, 20));

            const allNodes = nodeEnter.merge(node);

            function ticked() {
                allLinks
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                allLinkLabels
                    .attr('x', d => (d.source.x + d.target.x) / 2)
                    .attr('y', d => (d.source.y + d.target.y) / 2);

                allNodes
                    .attr('transform', d => `translate(${d.x},${d.y})`);
            }
        }

        function dragStart(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragging(event, d) {
            d.fx = event.x;
            d.fy = event.y;
        }

        function dragEnd(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }

        /* ═══════════════════════════════════════════
           Node List
           ═══════════════════════════════════════════ */
        function buildNodeList() {
            const list = document.getElementById('nodeList');
            const nodes = ROOM.getNodes();

            // Group by type
            const grouped = {};
            nodes.forEach(n => {
                if (!grouped[n.type]) grouped[n.type] = [];
                grouped[n.type].push(n);
            });

            list.innerHTML = '';
            const typeOrder = ['place', 'event', 'perspective', 'artifact'];

            typeOrder.forEach(type => {
                const items = grouped[type] || [];
                if (items.length === 0) return;

                const heading = document.createElement('div');
                heading.style.cssText = 'font-size:var(--text-xs); color:var(--room-text-muted); font-weight:600; text-transform:uppercase; padding:var(--space-sm); margin-top:var(--space-sm)';
                heading.textContent = `${ROOM.NODE_ICONS[type]} ${type}s (${items.length})`;
                list.appendChild(heading);

                items.forEach(node => {
                    const item = document.createElement('div');
                    item.className = `node-list-item ${node.id === selectedNodeId ? 'selected' : ''}`;
                    item.innerHTML = `
            <span class="node-list-icon">${node.icon || ROOM.NODE_ICONS[node.type]}</span>
            <div class="node-list-info">
              <div class="node-list-name">${node.label}</div>
              <div class="node-list-meta">${node.ontology ? `${node.ontology} · ` : ''}${node.id}</div>
            </div>
            <button class="btn btn-sm node-list-delete" data-delete="${node.id}" title="Delete">🗑️</button>
          `;
                    item.addEventListener('click', (e) => {
                        if (e.target.closest('.node-list-delete')) return;
                        selectGraphNode(node.id);
                    });
                    list.appendChild(item);
                });
            });

            // Delete handlers
            list.querySelectorAll('[data-delete]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.dataset.delete;
                    if (confirm(`Delete node "${id}"?`)) {
                        ROOM.removeNode(id);
                        ROOM.saveToStorage();
                        updateGraph();
                        buildNodeList();
                        updateStats();
                        syncJSON();
                        showToast(`Deleted ${id}`);
                    }
                });
            });
        }

        /* ═══════════════════════════════════════════
           Ontology Chips
           ═══════════════════════════════════════════ */
        function buildOntologyChips() {
            const container = document.getElementById('ontologyChips');
            container.innerHTML = '';

            const ontologies = ROOM.getOntologies();
            ontologies.forEach(ontology => {
                const color = ROOM.ONTOLOGY_COLORS[ontology] || '#888';
                const chip = document.createElement('button');
                chip.className = `filter-chip ${activeOntologies.has(ontology) ? '' : 'off'}`;
                chip.style.cssText = `color:${color}; border-color:${color}40`;
                chip.textContent = ontology;
                chip.addEventListener('click', () => {
                    if (activeOntologies.has(ontology)) {
                        activeOntologies.delete(ontology);
                    } else {
                        activeOntologies.add(ontology);
                    }
                    chip.classList.toggle('off');
                    // TODO: filter graph nodes by ontology
                });
                container.appendChild(chip);
            });
        }

        /* ═══════════════════════════════════════════
           Select Node
           ═══════════════════════════════════════════ */
        function selectGraphNode(nodeId) {
            selectedNodeId = nodeId;

            // Highlight in graph
            nodeGroup.selectAll('.graph-node')
                .classed('selected', d => d.id === nodeId);

            // Highlight in list
            document.querySelectorAll('.node-list-item').forEach(el => {
                el.classList.remove('selected');
            });
            // Find and highlight in list
            buildNodeList();

            // Switch to nodes tab
            switchPanel('nodes');
        }

        /* ═══════════════════════════════════════════
           Add Node
           ═══════════════════════════════════════════ */
        function addNewNode() {
            const type = document.getElementById('addType').value;
            const label = document.getElementById('addLabel').value.trim();
            if (!label) { showToast('Label is required'); return; }

            const node = {
                type,
                label,
                description: document.getElementById('addDescription').value.trim(),
                position: [
                    parseFloat(document.getElementById('addPosX').value) || 0,
                    parseFloat(document.getElementById('addPosY').value) || 5,
                    parseFloat(document.getElementById('addPosZ').value) || 0
                ],
                icon: ROOM.NODE_ICONS[type]
            };

            if (type === 'event') {
                node.place = document.getElementById('addEventPlace').value;
                node.time = document.getElementById('addEventTime').value
                    ? new Date(document.getElementById('addEventTime').value).toISOString()
                    : new Date().toISOString();
            }

            if (type === 'perspective') {
                node.event = document.getElementById('addPerspectiveEvent').value;
                node.ontology = document.getElementById('addOntology').value.trim() || 'personal';
                node.visibility = document.getElementById('addVisibility').value;
                node.content = document.getElementById('addContent').value.trim();
            }

            if (type === 'artifact') {
                node.perspective = document.getElementById('addArtifactPerspective').value;
                node.src = document.getElementById('addSrc').value.trim();
            }

            ROOM.addNode(node);
            ROOM.saveToStorage();
            updateGraph();
            buildNodeList();
            buildOntologyChips();
            populateDropdowns();
            updateStats();
            syncJSON();
            showToast(`Created ${type}: ${label}`);

            // Clear form
            document.getElementById('addLabel').value = '';
            document.getElementById('addDescription').value = '';
        }

        /* ═══════════════════════════════════════════
           Claudesidian Import
           ═══════════════════════════════════════════ */
        function previewClaudesidian() {
            const markdown = document.getElementById('claudesidianInput').value;
            if (!markdown.trim()) { showToast('Paste some markdown first'); return; }

            const eventId = document.getElementById('claudesidianEvent').value;
            const perspective = ROOM.obsidianToPerspective(markdown, { event: eventId });

            const preview = document.getElementById('importPreview');
            const content = document.getElementById('importPreviewContent');

            content.innerHTML = `
        <div style="margin-bottom:var(--space-sm)">
          <span class="badge badge-perspective">👁️ perspective</span>
          <span class="ontology-tag ontology-${perspective.ontology}">${perspective.ontology}</span>
        </div>
        <div style="font-weight:600; margin-bottom:var(--space-xs)">${perspective.label}</div>
        <div style="font-size:var(--text-xs); color:var(--room-text-dim); max-height:100px; overflow-y:auto">${escapeHTML(perspective.content).substring(0, 300)}…</div>
        <div style="font-size:var(--text-xs); color:var(--room-text-muted); margin-top:var(--space-xs)">
          Visibility: ${perspective.visibility} · Event: ${perspective.event || 'none'}
        </div>
      `;
            preview.classList.add('show');
        }

        function importClaudesidian() {
            const markdown = document.getElementById('claudesidianInput').value;
            if (!markdown.trim()) { showToast('Paste some markdown first'); return; }

            const eventId = document.getElementById('claudesidianEvent').value;
            const perspective = ROOM.obsidianToPerspective(markdown, { event: eventId });

            // Add position from the event if it has one
            if (eventId) {
                const event = ROOM.getNodeById(eventId);
                if (event && event.position) {
                    perspective.position = [
                        event.position[0] + (Math.random() - 0.5) * 4,
                        event.position[1] + 1,
                        event.position[2] + (Math.random() - 0.5) * 4
                    ];
                }
            }

            ROOM.addNode(perspective);
            ROOM.saveToStorage();
            updateGraph();
            buildNodeList();
            buildOntologyChips();
            updateStats();
            syncJSON();

            showToast(`Imported perspective: ${perspective.label}`);
            document.getElementById('claudesidianInput').value = '';
            document.getElementById('importPreview').classList.remove('show');
        }

        /* ═══════════════════════════════════════════
           JSON Panel
           ═══════════════════════════════════════════ */
        function syncJSON() {
            document.getElementById('jsonEditor').value = ROOM.exportWorld();
        }

        function applyJSON() {
            try {
                const data = JSON.parse(document.getElementById('jsonEditor').value);
                ROOM.loadWorld(data);
                ROOM.saveToStorage();
                updateGraph();
                buildNodeList();
                buildOntologyChips();
                populateDropdowns();
                updateStats();
                showToast('JSON applied successfully');
            } catch (err) {
                showToast(`JSON error: ${err.message}`);
            }
        }

        function copyJSON() {
            navigator.clipboard.writeText(ROOM.exportWorld());
            showToast('Copied to clipboard');
        }

        function downloadJSON() {
            const blob = new Blob([ROOM.exportWorld()], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'world.json';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Downloaded world.json');
        }

        /* ═══════════════════════════════════════════
           Dropdowns
           ═══════════════════════════════════════════ */
        function populateDropdowns() {
            const places = ROOM.getPlaces();
            const events = ROOM.getEvents();
            const perspectives = ROOM.getPerspectives();

            fillSelect('addEventPlace', places);
            fillSelect('addPerspectiveEvent', events);
            fillSelect('addArtifactPerspective', perspectives);
            fillSelect('claudesidianEvent', events);
        }

        function fillSelect(id, items) {
            const sel = document.getElementById(id);
            if (!sel) return;
            sel.innerHTML = `<option value="">-- none --</option>` +
                items.map(item => `<option value="${item.id}">${item.icon || ''} ${item.label}</option>`).join('');
        }

        /* ═══════════════════════════════════════════
           Panel Tabs
           ═══════════════════════════════════════════ */
        function switchPanel(panelId) {
            document.querySelectorAll('.panel-tab').forEach(t => t.classList.toggle('active', t.dataset.panel === panelId));
            document.querySelectorAll('.panel-content').forEach(p => p.classList.toggle('active', p.id === `panel-${panelId}`));
        }

        /* ═══════════════════════════════════════════
           Stats
           ═══════════════════════════════════════════ */
        function updateStats() {
            const world = ROOM.getWorld();
            if (!world) return;
            const p = ROOM.getPlaces().length;
            const e = ROOM.getEvents().length;
            const pe = ROOM.getPerspectives().length;
            const a = ROOM.getArtifacts().length;
            document.getElementById('graphStats').textContent =
                `${world.nodes.length} nodes · ${world.edges.length} edges | 📍${p} ⚡${e} 👁️${pe} 📄${a}`;
        }

        /* ═══════════════════════════════════════════
           Events
           ═══════════════════════════════════════════ */
        function setupEvents() {
            // Panel tabs
            document.querySelectorAll('.panel-tab').forEach(tab => {
                tab.addEventListener('click', () => switchPanel(tab.dataset.panel));
            });

            // Type change → show/hide conditional fields
            document.getElementById('addType').addEventListener('change', (e) => {
                document.getElementById('addEventFields').style.display = e.target.value === 'event' ? 'block' : 'none';
                document.getElementById('addPerspectiveFields').style.display = e.target.value === 'perspective' ? 'block' : 'none';
                document.getElementById('addArtifactFields').style.display = e.target.value === 'artifact' ? 'block' : 'none';
            });

            // Add node
            document.getElementById('btnAddNode').addEventListener('click', addNewNode);

            // Claudesidian
            document.getElementById('btnPreview').addEventListener('click', previewClaudesidian);
            document.getElementById('btnImport').addEventListener('click', importClaudesidian);

            // JSON
            document.getElementById('btnJsonLoad').addEventListener('click', applyJSON);
            document.getElementById('btnJsonCopy').addEventListener('click', copyJSON);
            document.getElementById('btnJsonDownload').addEventListener('click', downloadJSON);
            document.getElementById('btnJsonImportFile').addEventListener('click', () => {
                document.getElementById('jsonFileInput').click();
            });
            document.getElementById('jsonFileInput').addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('jsonEditor').value = ev.target.result;
                    applyJSON();
                };
                reader.readAsText(file);
            });

            // Graph controls
            document.getElementById('btnZoomFit').addEventListener('click', () => {
                if (simulation) {
                    simulation.alpha(0.3).restart();
                }
            });
            document.getElementById('btnRestart').addEventListener('click', () => {
                updateGraph();
            });
            document.getElementById('btnClearStorage').addEventListener('click', () => {
                if (confirm('Reset to default data? Your edits will be lost.')) {
                    ROOM.clearStorage();
                    location.reload();
                }
            });

            // Resize
            window.addEventListener('resize', () => {
                const container = document.getElementById('graphCanvas');
                graphWidth = container.clientWidth;
                graphHeight = container.clientHeight;
                svg.attr('width', graphWidth).attr('height', graphHeight);
            });

            // SVG click to deselect
            svg.on('click', () => {
                selectedNodeId = null;
                nodeGroup.selectAll('.graph-node').classed('selected', false);
                buildNodeList();
            });
        }

        /* ═══════════════════════════════════════════
           Utilities
           ═══════════════════════════════════════════ */
        function truncate(str, len) {
            return str.length > len ? str.substring(0, len) + '…' : str;
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        /* ═══════════════════════════════════════════
           Boot
           ═══════════════════════════════════════════ */
        init().catch(err => {
            console.error('ROOM Editor init error:', err);
            showToast(`Error: ${err.message}`);
        });
    </script>
</body>

</html>
